name: ${mod_id}
version: ${version}
main: heos.folia.HeosFoliaPlugin
api-version: '${api_version}'
folia-supported: true
author: ${mod_author}
website: ${mod_homepage}
description: ${mod_description}
commands:
  login:
    aliases: [l]
    description: Log in to your LuoOS account
    usage: /login <password>
  register:
    aliases: [reg]
    description: Register your LuoOS account
    usage: /register <password> <confirmPassword>
  changepassword:
    aliases: [changepw]
    description: Change your LuoOS password
    usage: /changepassword <oldPassword> <newPassword>
  ban:
    description: Ban a player
    usage: /ban <player> [time] [reason]
    permission: luoos.admin
  ban-ip:
    description: Ban an IP address
    usage: /ban-ip <ip> [time] [reason]
    permission: luoos.admin
  unban:
    description: Unban a player or IP
    usage: /unban <player|ip>
    permission: luoos.admin
  unban-ip:
    description: Unban an IP address
    usage: /unban-ip <ip>
    permission: luoos.admin
  banlist:
    description: Show LuoOS bans
    usage: /banlist
    permission: luoos.admin
  los:
    description: LuoOS administration and player commands
    usage: /los <login|register|changepassword|ban|ban-ip|unban|unban-ip|banlist|resetpassword|info|whitelist|migrate|reload|bind>
permissions:
  luoos.admin:
    default: op
  luoos.bind:
    default: true
